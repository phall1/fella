name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-gnu
            arch: x86_64
            runner: ubuntu-24.04
          - target: aarch64-linux-gnu
            arch: aarch64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        run: |
          ZIG_VERSION="0.16.0"
          ZIG_TAR="zig-${{ matrix.arch }}-linux-${ZIG_VERSION}.tar.xz"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/${ZIG_TAR}" -o "/tmp/${ZIG_TAR}"
          sudo tar -xf "/tmp/${ZIG_TAR}" -C /usr/local
          sudo ln -sf "/usr/local/zig-${{ matrix.arch }}-linux-${ZIG_VERSION}/zig" /usr/local/bin/zig
          zig version

      - name: Build release binary
        run: zig build -Doptimize=ReleaseSafe

      - name: Package binary
        run: |
          mkdir -p dist
          cp zig-out/bin/fella dist/fella-${{ github.ref_name }}-${{ matrix.arch }}-linux
          cp scripts/install.sh dist/install-${{ matrix.arch }}.sh
          chmod +x dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fella-${{ matrix.arch }}-linux
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
